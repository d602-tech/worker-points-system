name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build
        env:
          VITE_GAS_URL: ${{ secrets.GAS_WEB_APP_URL }}
          VITE_SHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          VITE_DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # GitHub Pages 部署在 /worker-points-system/ 子路徑
          VITE_BASE_URL: /worker-points-system/
        # 只建置前端靜態檔案，跳過後端 Express server 的編譯
        run: pnpm vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
